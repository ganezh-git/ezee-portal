<div class="profile-page">
  <div class="profile-header">
    <a routerLink="/portal" class="back-link">
      <span class="material-icons-round">arrow_back</span>
      Back to Dashboard
    </a>
    <h1>My Profile</h1>
  </div>

  @if (loading) {
    <div class="loading">Loading profile...</div>
  } @else {
    <div class="profile-grid">
      <!-- Profile Info Card -->
      <div class="card">
        <div class="card-header">
          <span class="material-icons-round">person</span>
          Profile Information
        </div>

        <div class="read-only-info">
          <div class="info-row">
            <label>Username</label>
            <span>{{ username }}</span>
          </div>
          <div class="info-row">
            <label>Role</label>
            <span class="badge">{{ role }}</span>
          </div>
          <div class="info-row">
            <label>Type</label>
            <span>{{ userType }}</span>
          </div>
          @if (lastLogin) {
            <div class="info-row">
              <label>Last Login</label>
              <span>{{ lastLogin }}</span>
            </div>
          }
          <div class="info-row">
            <label>Member Since</label>
            <span>{{ createdAt }}</span>
          </div>
        </div>

        @if (message) {
          <div class="message" [class.success]="messageType === 'success'" [class.error]="messageType === 'error'">
            {{ message }}
          </div>
        }

        <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input id="fullName" type="text" formControlName="fullName">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" formControlName="email">
          </div>
          <div class="form-group">
            <label for="department">Department</label>
            <input id="department" type="text" formControlName="department">
          </div>
          <div class="form-group">
            <label for="designation">Designation</label>
            <input id="designation" type="text" formControlName="designation">
          </div>
          <button type="submit" class="btn-primary" [disabled]="saving || profileForm.invalid">
            @if (saving) { Saving... } @else { Save Changes }
          </button>
        </form>
      </div>

      <!-- Change Password Card -->
      <div class="card">
        <div class="card-header">
          <span class="material-icons-round">lock</span>
          Change Password
        </div>

        @if (pwMessage) {
          <div class="message" [class.success]="pwMessageType === 'success'" [class.error]="pwMessageType === 'error'">
            {{ pwMessage }}
          </div>
        }

        <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
          <div class="form-group">
            <label for="currentPassword">Current Password</label>
            <input id="currentPassword" type="password" formControlName="currentPassword">
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input id="newPassword" type="password" formControlName="newPassword" placeholder="Min 6 characters">
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <input id="confirmPassword" type="password" formControlName="confirmPassword">
          </div>
          <button type="submit" class="btn-primary" [disabled]="changingPassword || passwordForm.invalid">
            @if (changingPassword) { Changing... } @else { Change Password }
          </button>
        </form>
      </div>
    </div>
  }
</div>
