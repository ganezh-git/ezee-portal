<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#29b6f6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#29b6f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1565c0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Glow background -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)" opacity="0.3"/>
  <!-- Main E shape - circuit board style -->
  <g fill="none" stroke="url(#g)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical bar of E -->
    <path d="M 150,100 L 150,412"/>
    <!-- Top horizontal -->
    <path d="M 150,100 L 340,100"/>
    <!-- Middle horizontal -->
    <path d="M 150,256 L 310,256"/>
    <!-- Bottom horizontal -->
    <path d="M 150,412 L 340,412"/>
    <!-- Top circuit trace going up-right -->
    <path d="M 340,100 L 370,70"/>
    <!-- Middle circuit trace -->
    <path d="M 310,256 L 340,226"/>
    <!-- Bottom circuit trace going down-right -->
    <path d="M 340,412 L 370,442"/>
    <!-- Left vertical trace going up -->
    <path d="M 150,100 L 120,60"/>
    <!-- Mid-left trace -->
    <path d="M 150,180 L 210,180 L 240,210"/>
    <!-- Inner trace 1 -->
    <path d="M 150,330 L 200,330 L 220,310"/>
  </g>
  <!-- Circuit nodes (dots at endpoints) -->
  <g fill="url(#g)">
    <circle cx="120" cy="60" r="14"/>
    <circle cx="370" cy="70" r="14"/>
    <circle cx="240" cy="210" r="11"/>
    <circle cx="340" cy="226" r="12"/>
    <circle cx="220" cy="310" r="11"/>
    <circle cx="370" cy="442" r="14"/>
    <!-- Junction nodes -->
    <circle cx="150" cy="100" r="10"/>
    <circle cx="150" cy="256" r="10"/>
    <circle cx="150" cy="412" r="10"/>
    <circle cx="150" cy="180" r="8"/>
    <circle cx="150" cy="330" r="8"/>
  </g>
</svg>
